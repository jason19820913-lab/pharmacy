<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>鶯歌院區 領藥順序</title>
<script src="config.js"></script>
<style>
  :root {
    --green: #1a7f4e;
    --green-dark: #135c39;
    --bg: #f4f9f6;
    --card: #ffffff;
    --text: #1c2b24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--green);
    color: #fff;
    padding: clamp(10px, 1.5vh, 22px) clamp(16px, 2vw, 36px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  header h1 { font-size: clamp(24px, 3.2vw, 54px); font-weight: 700; }
  #status {
    font-size: clamp(13px, 1.3vw, 22px);
    opacity: .92;
    text-align: right;
    line-height: 1.4;
  }
  #stale {
    display: none;
    background: #c0392b;
    color: #fff;
    text-align: center;
    padding: 8px;
    font-size: clamp(14px, 1.6vw, 24px);
  }
  #notice {
    background: #fff7df;
    color: #7a5a00;
    border-bottom: 2px solid #f0d98c;
    text-align: center;
    padding: clamp(8px, 1.2vh, 16px);
    font-size: clamp(16px, 2vw, 34px);
    font-weight: 700;
  }
  main { flex: 1; padding: clamp(12px, 2vw, 32px); }

  /* 領藥順序卡片：號碼 + 姓名，全部同等呈現 */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(clamp(260px, 30vw, 460px), 1fr));
    gap: clamp(10px, 1.5vw, 24px);
  }
  .card {
    background: var(--card);
    border-radius: clamp(12px, 1.2vw, 22px);
    padding: clamp(12px, 1.6vw, 28px) clamp(14px, 1.8vw, 30px);
    display: flex;
    align-items: center;
    gap: clamp(14px, 1.8vw, 30px);
    box-shadow: 0 3px 10px rgba(0,0,0,.10);
  }
  .card .num {
    background: var(--green);
    color: #fff;
    border-radius: clamp(10px, 1vw, 18px);
    font-size: clamp(40px, 5.5vw, 96px);
    font-weight: 800;
    line-height: 1;
    min-width: 1.6em;
    padding: .18em .2em;
    text-align: center;
    flex-shrink: 0;
  }
  .card .name {
    font-size: clamp(38px, 5vw, 88px);
    font-weight: 700;
    letter-spacing: .04em;
  }
  #empty {
    display: none;
    text-align: center;
    padding: 12vh 20px;
    font-size: clamp(28px, 4vw, 60px);
    color: #7a9187;
  }
  footer {
    background: var(--green-dark);
    color: #fff;
    padding: clamp(8px, 1.2vh, 16px);
    text-align: center;
    font-size: clamp(14px, 1.5vw, 26px);
  }

  /* 直式平板/手機：單欄較窄卡片 */
  @media (max-width: 600px) {
    #grid { grid-template-columns: 1fr; }
  }
  /* 電視/大螢幕橫式：固定三欄，字再放大 */
  @media (min-width: 1600px) {
    #grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<header>
  <h1>鶯歌院區｜領藥順序</h1>
  <div id="status">載入中…</div>
</header>
<div id="stale">⚠ 資料連線更新中，順序可能非即時，請以現場叫號為準</div>
<div id="notice">📋 如領第二、三次慢性處方箋，請直接告知藥師</div>
<main>
  <div id="grid"></div>
  <div id="empty">目前沒有等候領藥的名單 🌿</div>
</main>
<footer>請憑健保卡至藥局櫃檯領藥｜順序依調劑完成時間排列，自動更新</footer>

<script>
var CLINIC = '鶯歌院區';
var POLL_MS = 5000;
var STALE_SEC = 300; // 資料時間超過5分鐘沒變動才顯示警告
var _lastUpd = null, _lastChange = Date.now();

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render(data) {
  var list = data.list || [];
  var grid = document.getElementById('grid');
  var empty = document.getElementById('empty');

  if (list.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    var html = '';
    for (var i = 0; i < list.length; i++) {
      html += '<div class="card"><span class="num">' + list[i].seq +
              '</span><span class="name">' + esc(list[i].name) + '</span></div>';
    }
    grid.innerHTML = html;
  }

  var upd = data.updated || '';
  document.getElementById('status').innerHTML =
    '等候人數 <b>' + list.length + '</b> 人<br>資料時間 ' + esc(upd || '—');

  // 不比對裝置時鐘（電視/平板時間常不準），改看資料時間是否持續變動
  if (upd !== _lastUpd) {
    _lastUpd = upd;
    _lastChange = Date.now();
  }
  var isStale = (Date.now() - _lastChange) / 1000 > STALE_SEC;
  document.getElementById('stale').style.display = isStale ? 'block' : 'none';
}

function poll() {
  if (typeof QUEUE_API === 'undefined' || !QUEUE_API) {
    document.getElementById('status').textContent = '請先設定 config.js 的 QUEUE_API';
    return;
  }
  fetch(QUEUE_API + '?action=get&clinic=' + encodeURIComponent(CLINIC))
    .then(function (r) { return r.json(); })
    .then(render)
    .catch(function () {
      document.getElementById('stale').style.display = 'block';
    });
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
